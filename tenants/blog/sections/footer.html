<footer class="section-sm pb-0 border-top border-default">
  <div class="container">
    <div class="columns is-multiline is-justify-content-space-between">

      <div class="column is-3-desktop">
        <a class="mb-5 is-block" href="/">
          <img width="150px" src="{{nav.logo}}" alt="{{nav.logoAlt}}">
        </a>
        <p>{{footer.description}}</p>
      </div>

      <div class="column is-2-widescreen is-3-desktop is-6">
        <h6 class="mb-4">Quick Links</h6>
        <ul class="list-unstyled footer-list">
          {{#each sidebar.quickLinks}}
          <li><a href="{{href}}">{{label}}</a></li>
          {{/each}}
        </ul>
      </div>

      <div class="column is-2-widescreen is-3-desktop is-6">
        <h6 class="mb-4">Social Links</h6>
        <ul class="list-unstyled footer-list">
          {{#each sidebar.socialLinks}}
          <li><a href="{{href}}">{{label}}</a></li>
          {{/each}}
        </ul>
      </div>

      <div class="column is-3-desktop">
        <h6 class="mb-4">{{footer.subscribe.title}}</h6>
        <form class="subscription" action="javascript:void(0)" method="post">
          <div class="is-relative">
            <i class="ti-email email-icon"></i>
            <input type="email" class="input" placeholder="{{footer.subscribe.placeholder}}">
          </div>
          <button class="btn btn-primary w-100 rounded mt-2" type="submit">{{footer.subscribe.buttonLabel}}</button>
        </form>
      </div>

    </div>

    <div class="scroll-top">
      <a href="javascript:void(0);" id="scrollTop"><i class="ti-angle-up"></i></a>
    </div>
    <div class="has-text-centered">
      <p class="content">&copy; 2025 — {{name}}</p>
    </div>
  </div>
</footer>
