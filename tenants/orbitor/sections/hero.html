<section class="banner is-flex is-align-items-center">
  <div class="banner-img-part"></div>
  <div class="container">
    <div class="columns">
      <div class="column is-8-widescreen is-10-desktop">
        <div class="block">
          <span class="is-uppercase text-sm letter-spacing">{{hero.tagline}}</span>
          <h1 class="my-4">{{hero.headline}}</h1>
          <p class="mb-6">{{hero.body}}</p>
          <a href="{{hero.cta.href}}" target="_blank" class="btn btn-main">{{hero.cta.label}} <i class="fa fa-angle-right ml-2"></i></a>
        </div>
      </div>
    </div>
  </div>
</section>
