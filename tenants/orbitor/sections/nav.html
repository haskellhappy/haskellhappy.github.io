<div id="navbar" class="navigation py-4">
  <div class="container">
    <nav class="navbar">
      <div class="navbar-brand">
        <a class="navbar-item" href="/">
          <img src="{{nav.logo}}" alt="{{nav.logoAlt}}">
        </a>
        <button role="button" class="navbar-burger burger" data-hidden="true" data-target="navigation">
          <span aria-hidden="true"></span>
          <span aria-hidden="true"></span>
          <span aria-hidden="true"></span>
        </button>
      </div>

      <div class="navbar-menu" id="navigation">
        <ul class="navbar-start ml-auto">
          {{#each nav.links}}
          <li class="navbar-item">
            <a class="navbar-link" href="{{href}}">{{label}}</a>
          </li>
          {{/each}}
        </ul>
        <ul class="navbar-end ml-0">
          <li class="navbar-item">
            <a href="{{nav.cta.href}}" class="btn btn-solid-border">{{nav.cta.label}} <i class="fa fa-angle-right ml-2"></i></a>
          </li>
        </ul>
      </div>
    </nav>
  </div>
</div>
